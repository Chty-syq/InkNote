name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          node scripts/update-desktop-version.mjs --check
          $tauriVersion = (Get-Content apps/desktop/src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $cargoVersion = (Select-String -Path apps/desktop/src-tauri/Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          $packageVersion = (Get-Content apps/desktop/package.json | ConvertFrom-Json).version
          $expectedTag = "v$tauriVersion"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Tag $env:GITHUB_REF_NAME does not match Tauri version $expectedTag"
          }
          if ($cargoVersion -ne $tauriVersion -or $packageVersion -ne $tauriVersion) {
            throw "Desktop versions are inconsistent: tauri=$tauriVersion cargo=$cargoVersion package=$packageVersion"
          }

      - name: Configure updater signing
        shell: pwsh
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: node scripts/configure-tauri-updater.mjs

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: v__VERSION__
          releaseName: InkNote v__VERSION__
          releaseBody: Download the Windows installer below.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      - name: Publish updater manifest
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/publish-tauri-updater-manifest.ps1

      - name: Verify updater manifest
        shell: pwsh
        run: |
          $tauriVersion = (Get-Content apps/desktop/src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $manifestUrls = @(
            "https://github.com/${{ github.repository }}/releases/download/v$tauriVersion/latest.json",
            "https://github.com/${{ github.repository }}/releases/latest/download/latest.json"
          )

          foreach ($manifestUrl in $manifestUrls) {
            $lastError = $null
            for ($attempt = 1; $attempt -le 6; $attempt++) {
              try {
                $response = Invoke-WebRequest -UseBasicParsing -Uri $manifestUrl -MaximumRedirection 5 -TimeoutSec 30
                $manifestContent = $response.Content
                if ($manifestContent -is [byte[]]) {
                  $manifestJson = [System.Text.Encoding]::UTF8.GetString($manifestContent)
                } else {
                  $manifestJson = [string]$manifestContent
                }
                $manifest = $manifestJson | ConvertFrom-Json
                if (-not $manifest.version) {
                  $preview = $manifestJson
                  if ($preview.Length -gt 200) {
                    $preview = $preview.Substring(0, 200)
                  }
                  throw "latest.json is missing the version field. Content preview: $preview"
                }
                if (-not $manifest.platforms) {
                  throw "latest.json is missing the platforms field."
                }
                if (-not $manifest.platforms.'windows-x86_64') {
                  throw "latest.json is missing the windows-x86_64 platform."
                }
                if (-not $manifest.platforms.'windows-x86_64'.signature) {
                  throw "latest.json is missing the windows-x86_64 signature."
                }
                if (-not $manifest.platforms.'windows-x86_64'.url) {
                  throw "latest.json is missing the windows-x86_64 installer URL."
                }
                Write-Host "Updater manifest is available: $manifestUrl"
                $lastError = $null
                break
              } catch {
                $lastError = $_.Exception.Message
                Write-Warning "Updater manifest check attempt $attempt failed for $manifestUrl`: $lastError"
                Start-Sleep -Seconds 10
              }
            }
            if ($lastError) {
              throw "Updater manifest was not published or is invalid at $manifestUrl`: $lastError"
            }
          }
