name: Deploy Web

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Resolve Pages base
        id: pages-base
        shell: bash
        env:
          CONFIGURED_BASE: ${{ vars.VITE_PAGES_BASE }}
        run: |
          if [ -n "$CONFIGURED_BASE" ]; then
            echo "base=$CONFIGURED_BASE" >> "$GITHUB_OUTPUT"
          else
            echo "base=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build web
        run: npm run web:build
        env:
          VITE_PAGES_BASE: ${{ steps.pages-base.outputs.base }}

      - name: Add SPA fallback
        run: cp apps/web/dist/index.html apps/web/dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
